<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Todo App</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
color:#222;
}

.wrap{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:36px;
}

.add-row{
display:grid;
gap:12px;
margin-bottom:25px;
}

input,
textarea,
select,
button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
resize:vertical;
min-height:90px;
}

button{
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

button:hover{
opacity:.9;
}

.weather-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

#taskList{
display:grid;
gap:15px;
margin-top:20px;
}

.task{
background:#f7f8fc;
border-radius:14px;
padding:16px;
display:flex;
justify-content:space-between;
gap:20px;
align-items:flex-start;
flex-wrap:wrap;
border:1px solid #e3e6f0;
}

.task-left{
flex:1;
min-width:240px;
}

.task h3{
margin-bottom:8px;
}

.task-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.task-buttons button{
width:auto;
padding:10px 16px;
}

.calendar-box{
margin-top:35px;
background:#fafafa;
border-radius:16px;
padding:20px;
border:1px solid #ddd;
overflow:hidden;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.calendar-header button{
width:auto;
padding:10px 18px;
}

#monthTitle{
font-size:24px;
font-weight:bold;
}

.view-select{
max-width:220px;
}

.calendar-grid{
display:grid;
gap:8px;
}

.month-view,
.week-view{
grid-template-columns:repeat(7,1fr);
}

.year-view{
grid-template-columns:repeat(4,1fr);
}

.day-view{
grid-template-columns:1fr;
}

.day-name{
background:#dde3f8;
padding:10px;
text-align:center;
font-weight:bold;
border-radius:8px;
min-width:0;
}

.day{
background:white;
border-radius:12px;
min-height:120px;
padding:8px;
border:1px solid #e1e1e1;
cursor:pointer;
transition:.2s;
overflow:hidden;
display:flex;
flex-direction:column;
min-width:0;
}

.day:hover{
background:#f2f4ff;
}

.day-number{
font-size:12px;
font-weight:bold;
color:#666;
margin-bottom:6px;
}

.calendar-task{
background:#4f46e5;
color:white;
padding:4px 6px;
border-radius:6px;
font-size:11px;
margin-top:5px;
white-space:nowrap;
overflow:hidden;
text-overflow:ellipsis;
}

.month-box{
background:white;
padding:25px;
border-radius:14px;
text-align:center;
font-weight:bold;
cursor:pointer;
border:1px solid #ddd;
transition:.2s;
}

.month-box:hover{
background:#eef1ff;
}

.empty{
visibility:hidden;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
margin-top:10px;
}

.urgent{background:#ffd2d2;}
.high{background:#ffe5bd;}
.medium{background:#dbeaff;}
.low{background:#daf7d4;}

.repeat{
margin-top:10px;
font-size:13px;
color:#4f46e5;
font-weight:bold;
}

.week-label{
font-size:14px;
color:#555;
font-weight:bold;
}

@media(max-width:800px){

.month-view,
.week-view{
grid-template-columns:repeat(7,minmax(90px,1fr));
}

.calendar-grid{
overflow-x:auto;
}

.day-name,
.day{
min-width:90px;
}

.year-view{
grid-template-columns:repeat(2,1fr);
}

.weather-buttons{
grid-template-columns:1fr;
}

.calendar-header{
flex-direction:column;
align-items:stretch;
}

#monthTitle{
text-align:center;
font-size:20px;
}

.view-select{
max-width:100%;
}

.task{
flex-direction:column;
}

.task-buttons{
width:100%;
}

.task-buttons button{
flex:1;
}

}

</style>
</head>

<body>

<div class="wrap">

<h1>Smart Todo App</h1>

<div class="add-row">

<input
id="taskInput"
type="text"
placeholder="Task name">

<textarea
id="descriptionInput"
placeholder="Task description"></textarea>

<select id="priority">
<option value="urgent">Urgent</option>
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>

<input
id="dueDate"
type="datetime-local">

<select id="recurring">
<option value="none">No Recurring</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Every Other Week</option>
<option value="monthly">Monthly</option>
<option value="lastThursday">Last Thursday of Month</option>
</select>

<div class="weather-buttons">

<button onclick="enableNotifications()">
Enable Notifications
</button>

<button onclick="getWeatherTasks()">
Weather Smart Tasks
</button>

</div>

<button onclick="addTask()">
Add Task
</button>

</div>

<div id="taskList"></div>

<div class="calendar-box">

<div class="calendar-header">

<button onclick="changeViewDate(-1)">
◀
</button>

<div id="monthTitle"></div>

<button onclick="changeViewDate(1)">
▶
</button>

<select
id="calendarView"
class="view-select"
onchange="renderCalendar()">

<option value="month">Month View</option>
<option value="week">Week View</option>
<option value="day">Day View</option>
<option value="year">Year View</option>

</select>

</div>

<div
class="calendar-grid"
id="calendar">
</div>

</div>

</div>

<script>

let currentDate = new Date();

let tasks = [];

const monthNames = [
"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"
];

const dayNames = [
"Sun","Mon","Tue",
"Wed","Thu","Fri","Sat"
];

function renderCalendar(){

const calendar =
document.getElementById("calendar");

const monthTitle =
document.getElementById("monthTitle");

const view =
document.getElementById("calendarView").value;

calendar.innerHTML = "";

calendar.className = "calendar-grid";

const year =
currentDate.getFullYear();

const month =
currentDate.getMonth();

if(view === "month"){

calendar.classList.add("month-view");

monthTitle.textContent =
`${monthNames[month]} ${year}`;

dayNames.forEach(name=>{

calendar.innerHTML += `
<div class="day-name">
${name}
</div>
`;

});

const firstDay =
new Date(year,month,1).getDay();

const daysInMonth =
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

calendar.innerHTML += `
<div class="empty"></div>
`;

}

for(let day=1;day<=daysInMonth;day++){

const date =
`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

const taskHTML =
tasks
.filter(t=>t.dueDate.startsWith(date))
.map(t=>`
<div class="calendar-task">
${t.name}
</div>
`).join("");

calendar.innerHTML += `

<div class="day"
onclick="selectDate('${date}')">

<div class="day-number">
${month+1}/${day}
</div>

${taskHTML}

</div>

`;

}

}

else if(view === "week"){

calendar.classList.add("week-view");

const weekNumber =
Math.ceil(currentDate.getDate()/7);

const weekNames = [
"First","Second","Third",
"Fourth","Fifth"
];

monthTitle.innerHTML = `
${monthNames[month]} ${year}
<br>
<span class="week-label">
${weekNames[weekNumber-1]} Week of ${monthNames[month]}
</span>
`;

for(let i=0;i<7;i++){

const start =
new Date(currentDate);

start.setDate(
currentDate.getDate()
-currentDate.getDay()
+i
);

const dateString =
start.toISOString().split("T")[0];

const taskHTML =
tasks
.filter(t=>t.dueDate.startsWith(dateString))
.map(t=>`
<div class="calendar-task">
${t.name}
</div>
`).join("");

calendar.innerHTML += `

<div class="day"
onclick="selectDate('${dateString}')">

<div class="day-number">
${dayNames[i]}
<br>
${start.getMonth()+1}/${start.getDate()}
</div>

${taskHTML}

</div>

`;

}

}

else if(view === "day"){

calendar.classList.add("day-view");

monthTitle.textContent =
currentDate.toDateString();

const dateString =
currentDate.toISOString().split("T")[0];

const taskHTML =
tasks
.filter(t=>t.dueDate.startsWith(dateString))
.map(t=>`
<div class="calendar-task">
${t.name}
</div>
`).join("");

calendar.innerHTML += `

<div class="day"
style="min-height:300px"
onclick="selectDate('${dateString}')">

<h2>${currentDate.toDateString()}</h2>

<br>

${taskHTML || "No tasks yet"}

</div>

`;

}

else if(view === "year"){

calendar.classList.add("year-view");

monthTitle.textContent = year;

monthNames.forEach((name,index)=>{

calendar.innerHTML += `

<div class="month-box"
onclick="openMonth(${index})">

${name}

</div>

`;

});

}

}

renderCalendar();

</script>

</body>
</html>
