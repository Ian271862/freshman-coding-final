<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Todo App</title>

<style>

/* (YOUR ORIGINAL CSS — UNCHANGED) */

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
color:#222;
}

.wrap{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 4px 15px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:36px;
}

.add-row{
display:grid;
gap:12px;
margin-bottom:25px;
}

input,
textarea,
select,
button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
resize:vertical;
min-height:90px;
}

button{
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:.2s;
}

button:hover{opacity:.9;}

.weather-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

#taskList{
display:grid;
gap:15px;
margin-top:20px;
}

.task{
background:#f7f8fc;
border-radius:14px;
padding:16px;
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
border:1px solid #e3e6f0;
}

.task-left{flex:1;min-width:240px;}

.task-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.task-buttons button{
width:auto;
padding:10px 16px;
}

.calendar-box{
margin-top:35px;
background:#fafafa;
border-radius:16px;
padding:20px;
border:1px solid #ddd;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

.calendar-header button{
width:auto;
padding:10px 18px;
}

#monthTitle{font-size:24px;font-weight:bold;}

.calendar-grid{display:grid;gap:8px;}

.month-view,.week-view{grid-template-columns:repeat(7,1fr);}
.year-view{grid-template-columns:repeat(4,1fr);}
.day-view{grid-template-columns:1fr;}

.day-name{
background:#dde3f8;
padding:10px;
text-align:center;
font-weight:bold;
border-radius:8px;
}

.day{
background:white;
border-radius:12px;
min-height:120px;
padding:8px;
border:1px solid #e1e1e1;
cursor:pointer;
display:flex;
flex-direction:column;
}

.day-number{font-size:12px;font-weight:bold;color:#666;margin-bottom:6px;}

.calendar-task{
background:#4f46e5;
color:white;
padding:4px 6px;
border-radius:6px;
font-size:11px;
margin-top:5px;
}

.month-box{
background:white;
padding:25px;
border-radius:14px;
text-align:center;
font-weight:bold;
cursor:pointer;
border:1px solid #ddd;
}

.badge{display:inline-block;padding:5px 10px;border-radius:999px;font-size:12px;font-weight:bold;margin-top:10px;}

.urgent{background:#ffd2d2;}
.high{background:#ffe5bd;}
.medium{background:#dbeaff;}
.low{background:#daf7d4;}

.repeat{
margin-top:10px;
font-size:13px;
color:#4f46e5;
font-weight:bold;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Smart Todo App</h1>

<div class="add-row">

<input id="taskInput" type="text" placeholder="Task name">
<textarea id="descriptionInput" placeholder="Task description"></textarea>

<select id="priority">
<option value="urgent">Urgent</option>
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>

<input id="dueDate" type="datetime-local">

<select id="recurring">
<option value="none">No Recurring</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Every Other Week</option>
<option value="monthly">Monthly</option>
</select>

<div class="weather-buttons">
<button onclick="enableNotifications()">Enable Notifications</button>
<button onclick="getWeatherTasks()">Weather Smart Tasks</button>
</div>

<button onclick="addTask()">Add Task</button>

</div>

<div id="taskList"></div>

<div class="calendar-box">

<div class="calendar-header">

<button onclick="changeViewDate(-1)">◀</button>
<div id="monthTitle"></div>
<button onclick="changeViewDate(1)">▶</button>

<select id="calendarView" onchange="renderCalendar()">
<option value="month">Month View</option>
<option value="week">Week View</option>
<option value="day">Day View</option>
<option value="year">Year View</option>
</select>

</div>

<div id="calendar" class="calendar-grid"></div>

</div>

</div>

<script src="./script.js"></script>

</body>
</html>
