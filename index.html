<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>

  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 100px;
    }

    button {
      padding: 12px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>Welcome to My Website</h1>

  <p>This site is hosted with GitHub Pages.</p>

  <button onclick="changeText()">Click Me</button>

  <script>
    function changeText() {
      document.querySelector("p").innerText =
        "You clicked the button!";
    }
  </script>

</body>
</html>
