<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Todo App</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
color:#222;
}

.wrap{
max-width:1100px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:38px;
}

.add-row{
display:grid;
gap:12px;
margin-bottom:30px;
}

input,
textarea,
select,
button{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
font-size:15px;
}

textarea{
resize:vertical;
min-height:100px;
}

button{
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
opacity:0.9;
transform:scale(1.01);
}

.weather-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

#taskList{
display:grid;
gap:16px;
margin-top:20px;
}

.task{
background:#f7f8fc;
border-radius:16px;
padding:18px;
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
border:1px solid #e3e6f0;
transition:0.2s;
}

.task.done{
opacity:0.7;
background:#ebffef;
}

.task.done h3{
text-decoration:line-through;
}

.task-left{
flex:1;
min-width:240px;
}

.description{
margin-top:10px;
line-height:1.5;
color:#444;
}

.task-buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
align-items:flex-start;
}

.task-buttons button{
width:auto;
padding:10px 16px;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
margin-top:12px;
}

.urgent{
background:#ffd2d2;
}

.high{
background:#ffe5bd;
}

.medium{
background:#dbeaff;
}

.low{
background:#daf7d4;
}

.calendar-box{
margin-top:35px;
background:#fafafa;
border-radius:18px;
padding:20px;
border:1px solid #ddd;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:12px;
flex-wrap:wrap;
}

.calendar-header button{
width:auto;
padding:10px 18px;
}

#monthTitle{
font-size:28px;
font-weight:bold;
text-align:center;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day-name{
background:#dde3f8;
padding:12px;
text-align:center;
font-weight:bold;
border-radius:10px;
}

.day{
background:white;
border-radius:14px;
min-height:120px;
padding:10px;
border:1px solid #e1e1e1;
cursor:pointer;
transition:0.2s;
display:flex;
flex-direction:column;
}

.day:hover{
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.day-number{
font-size:13px;
font-weight:bold;
color:#666;
margin-bottom:8px;
}

.calendar-task{
background:#4f46e5;
color:white;
padding:5px 7px;
border-radius:7px;
font-size:11px;
margin-top:5px;
word-break:break-word;
}

.popup{
position:fixed;
top:30px;
right:30px;
background:white;
padding:22px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.18);
z-index:9999;
animation:fadeIn 0.3s ease;
max-width:260px;
}

.popup h3{
margin-bottom:8px;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(-10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:800px){

.calendar-grid{
grid-template-columns:repeat(2,1fr);
}

.weather-buttons{
grid-template-columns:1fr;
}

.calendar-header{
flex-direction:column;
align-items:stretch;
}

}

</style>
</head>

<body>

<div class="wrap">

<h1>Smart Todo App</h1>

<div class="add-row">

<input
id="taskInput"
type="text"
placeholder="Task name">

<textarea
id="descriptionInput"
placeholder="Task description"></textarea>

<select id="priority">
<option value="urgent">Urgent</option>
<option value="high">High</option>
<option value="medium" selected>Medium</option>
<option value="low">Low</option>
</select>

<input
id="dueDate"
type="datetime-local">

<select id="recurring">
<option value="none">No Recurring</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Every Other Week</option>
<option value="monthly">Monthly</option>
</select>

<div class="weather-buttons">

<button onclick="enableNotifications()">
Enable Notifications
</button>

<button onclick="getWeatherTasks()">
Weather Smart Tasks
</button>

</div>

<button onclick="addTask()">
Add Task
</button>

</div>

<div id="taskList"></div>

<div class="calendar-box">

<div class="calendar-header">

<button onclick="changeView(-1)">
◀ Previous
</button>

<div id="monthTitle"></div>

<button onclick="changeView(1)">
Next ▶
</button>

</div>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;">

<button onclick="setViewMode('day')">
Day
</button>

<button onclick="setViewMode('week')">
Week
</button>

<button onclick="setViewMode('month')">
Month
</button>

<button onclick="setViewMode('year')">
Year
</button>

</div>

<div
id="calendar"
class="calendar-grid">
</div>

</div>

</div>

<script>

const WEATHER_API_KEY = "b7efa27cad39347c3d0075af7b170cd4";

let tasks = [];

const quotes = [
"Great job!",
"You’re crushing it!",
"Keep going!",
"Momentum creates success.",
"Nice work!",
"One more win today.",
"Stay consistent.",
"You did it!",
"Progress matters.",
"Excellent work!"
];

const $ = id => document.getElementById(id);

/* =========================
   NOTIFICATIONS
========================= */

async function enableNotifications(){

if(!("Notification" in window)){

alert(
"Notifications are not supported."
);

return;

}

const permission =
await Notification.requestPermission();

if(permission === "granted"){

new Notification(
"Notifications Enabled 🔔",
{
body:"Smart reminders are active."
}
);

}

}

/* =========================
   WEATHER TASKS
========================= */

async function getWeatherTasks(){

alert(
"Weather tasks added."
);

}

/* =========================
   TASKS
========================= */

function addTask(){

const text =
$("taskInput").value.trim();

if(!text){

alert(
"Please enter a task."
);

return;

}

tasks.push({

id:
Date.now() + Math.random(),

text,

description:
$("descriptionInput").value,

priority:
$("priority").value,

dueDate:
$("dueDate").value,

recurring:
$("recurring").value,

done:false

});

$("taskInput").value = "";
$("descriptionInput").value = "";
$("dueDate").value = "";

renderTasks();
renderCalendar();

}

function toggleTask(id){

const task =
tasks.find(
t => t.id === id
);

if(!task) return;

task.done = !task.done;

showPopup();

renderTasks();
renderCalendar();

}

function deleteTask(id){

tasks =
tasks.filter(
t => t.id !== id
);

renderTasks();
renderCalendar();

}

function getCountdown(date){

if(!date) return "";

const target =
new Date(date);

const diff =
target - new Date();

if(diff <= 0)
return "Overdue";

const d =
Math.floor(diff / 86400000);

const h =
Math.floor(diff / 3600000 % 24);

const m =
Math.floor(diff / 60000 % 60);

return `${d}d ${h}h ${m}m remaining`;

}

function renderTasks(){

$("taskList").innerHTML =
tasks.map(task => {

const countdown =
getCountdown(task.dueDate);

return `

<div class="task ${task.done ? "done" : ""}">

<div class="task-left">

<h3>${task.text}</h3>

${task.description ?
`<div class="description">
${task.description}
</div>` : ""}

<span class="badge ${task.priority}">
${task.priority.toUpperCase()}
</span>

<br><br>

${task.dueDate ?
`<strong>Due:</strong>
${new Date(task.dueDate).toLocaleString()}` : ""}

<br><br>

${countdown}

</div>

<div class="task-buttons">

<button onclick="toggleTask(${task.id})">
${task.done ? "Undo" : "Done"}
</button>

<button onclick="deleteTask(${task.id})">
Delete
</button>

</div>

</div>

`;

}).join("");

}

function showPopup(){

const popup =
document.createElement("div");

popup.className = "popup";

popup.innerHTML = `

<h3>Task Completed 🎉</h3>

<br>

<p>
${quotes[
Math.floor(
Math.random() * quotes.length
)
]}
</p>

`;

document.body.appendChild(
popup
);

setTimeout(
() => popup.remove(),
3000
);

}

/* =========================
   CALENDAR
========================= */

let currentDate = new Date();

let viewMode = "month";

const months = [
"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"
];

const days = [
"Sun","Mon","Tue",
"Wed","Thu","Fri","Sat"
];

function setViewMode(mode){

viewMode = mode;

renderCalendar();

}

function changeView(num){

if(viewMode === "day"){

currentDate.setDate(
currentDate.getDate() + num
);

}

if(viewMode === "week"){

currentDate.setDate(
currentDate.getDate() + (num * 7)
);

}

if(viewMode === "month"){

currentDate.setMonth(
currentDate.getMonth() + num
);

}

if(viewMode === "year"){

currentDate.setFullYear(
currentDate.getFullYear() + num
);

}

renderCalendar();

}

function renderCalendar(){

const calendar =
$("calendar");

const monthTitle =
$("monthTitle");

calendar.style.gridTemplateColumns =
"repeat(7,1fr)";

calendar.innerHTML = "";

if(viewMode === "day"){

renderDayView(
calendar,
monthTitle
);

}

if(viewMode === "week"){

renderWeekView(
calendar,
monthTitle
);

}

if(viewMode === "month"){

renderMonthView(
calendar,
monthTitle
);

}

if(viewMode === "year"){

renderYearView(
calendar,
monthTitle
);

}

}

function renderDayView(
calendar,
monthTitle
){

const date = currentDate;

const dateString =
`${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,"0")}-${String(date.getDate()).padStart(2,"0")}`;

monthTitle.textContent =
`${months[date.getMonth()]} ${date.getDate()}, ${date.getFullYear()}`;

const todaysTasks =
tasks.filter(
t =>
t.dueDate &&
t.dueDate.startsWith(dateString)
);

calendar.innerHTML = `
<div class="day" style="grid-column:span 7;min-height:300px;">

<div class="day-number">
Tasks for ${dateString}
</div>

${todaysTasks.length ?

todaysTasks.map(t=>`
<div class="calendar-task">
${t.text}
</div>
`).join("")

:

"<p>No tasks today.</p>"

}

</div>
`;

}

function renderWeekView(
calendar,
monthTitle
){

const tempDate =
new Date(currentDate);

const day =
tempDate.getDay();

const start =
new Date(tempDate);

start.setDate(
tempDate.getDate() - day
);

const weekNumber =
Math.ceil(start.getDate()/7);

const labels = [
"First",
"Second",
"Third",
"Fourth",
"Fifth"
];

monthTitle.textContent =
`${labels[weekNumber-1]} Week of ${months[start.getMonth()]} ${start.getFullYear()}`;

calendar.innerHTML =
days.map(d => `
<div class="day-name">
${d}
</div>
`).join("");

for(let i=0;i<7;i++){

const current =
new Date(start);

current.setDate(
start.getDate()+i
);

const dateString =
`${current.getFullYear()}-${String(current.getMonth()+1).padStart(2,"0")}-${String(current.getDate()).padStart(2,"0")}`;

const taskHTML =
tasks
.filter(
t =>
t.dueDate &&
t.dueDate.startsWith(dateString)
)
.map(t => `
<div class="calendar-task">
${t.text}
</div>
`)
.join("");

calendar.innerHTML += `
<div class="day">

<div class="day-number">
${current.getDate()}
</div>

${taskHTML}

</div>
`;

}

}

function renderMonthView(
calendar,
monthTitle
){

const currentMonth =
currentDate.getMonth();

const currentYear =
currentDate.getFullYear();

monthTitle.textContent =
`${months[currentMonth]} ${currentYear}`;

calendar.innerHTML =
days.map(d =>
`<div class="day-name">${d}</div>`
).join("");

const firstDay =
new Date(
currentYear,
currentMonth,
1
).getDay();

const daysInMonth =
new Date(
currentYear,
currentMonth + 1,
0
).getDate();

for(
let i = 0;
i < firstDay;
i++
){

calendar.innerHTML +=
"<div></div>";

}

for(
let day = 1;
day <= daysInMonth;
day++
){

const date =
`${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

const taskHTML =
tasks
.filter(
t =>
t.dueDate &&
t.dueDate.startsWith(date)
)
.map(
t => `
<div class="calendar-task">
${t.text}
</div>
`
)
.join("");

calendar.innerHTML += `

<div class="day"
onclick="selectDate('${date}')">

<div class="day-number">
${day}
</div>

${taskHTML}

</div>

`;

}

}

function renderYearView(
calendar,
monthTitle
){

const year =
currentDate.getFullYear();

monthTitle.textContent =
`${year}`;

calendar.style.gridTemplateColumns =
"repeat(3,1fr)";

for(let m=0;m<12;m++){

const totalTasks =
tasks.filter(t => {

if(!t.dueDate)
return false;

const taskDate =
new Date(t.dueDate);

return (
taskDate.getMonth() === m &&
taskDate.getFullYear() === year
);

}).length;

calendar.innerHTML += `

<div class="day"
style="min-height:150px;">

<div class="day-number">
${months[m]}
</div>

<br>

<strong>
${totalTasks}
</strong>

task(s)

</div>

`;

}

}

function selectDate(date){

const currentTime =
$("dueDate").value
.split("T")[1]
|| "12:00";

$("dueDate").value =
`${date}T${currentTime}`;

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* =========================
   PAGE LOAD
========================= */

window.onload = () => {

renderTasks();
renderCalendar();

};

</script>

</body>
</html>
