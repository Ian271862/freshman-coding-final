<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smart Todo App</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
color:#222;
}

.wrap{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 8px 25px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:38px;
}

.add-row{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-bottom:30px;
}

textarea,
input,
select,
button{
width:100%;
padding:14px;
border-radius:12px;
border:1px solid #dcdcdc;
font-size:15px;
}

textarea{
resize:vertical;
min-height:100px;
}

button{
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:.2s;
height:50px;
}

button:hover{
background:#4338ca;
}

.weather-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
grid-column:span 2;
}

.full{
grid-column:span 2;
}

#taskList{
display:grid;
gap:15px;
margin-bottom:35px;
}

.task{
background:#f8f8f8;
padding:18px;
border-radius:14px;
border-left:6px solid #4f46e5;
}

.task h3{
margin-bottom:10px;
}

.task p{
margin:5px 0;
color:#555;
}

.calendar-box{
background:#fafafa;
padding:20px;
border-radius:18px;
border:1px solid #e5e5e5;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
gap:15px;
margin-bottom:20px;
flex-wrap:wrap;
}

.calendar-controls{
display:flex;
align-items:center;
gap:10px;
}

.calendar-controls button{
width:50px;
height:50px;
padding:0;
}

#monthTitle{
font-size:24px;
font-weight:bold;
}

.view-select{
width:180px;
height:50px;
}

.calendar-grid{
display:grid;
gap:8px;
}

.month-view,
.week-view{
grid-template-columns:repeat(7,1fr);
}

.year-view{
grid-template-columns:repeat(4,1fr);
}

.day-view{
grid-template-columns:1fr;
}

.day-name{
background:#ececec;
padding:10px;
border-radius:10px;
text-align:center;
font-weight:bold;
font-size:14px;
}

.day{
background:white;
border-radius:14px;
min-height:110px;
padding:8px;
position:relative;
cursor:pointer;
transition:.2s;
border:1px solid #ececec;
overflow:hidden;
}

.day:hover{
transform:translateY(-2px);
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

.day-number{
position:absolute;
top:8px;
right:10px;
font-size:12px;
font-weight:bold;
color:#777;
}

.calendar-task{
background:#4f46e5;
color:white;
padding:5px 8px;
border-radius:8px;
margin-top:20px;
font-size:12px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap;
}

.empty{
background:transparent;
border:none;
}

.year-month{
display:flex;
justify-content:center;
align-items:center;
font-weight:bold;
font-size:18px;
min-height:120px;
}

.big-day{
padding:20px;
min-height:350px;
}

.big-day h2{
margin-bottom:20px;
}

@media(max-width:800px){

.add-row{
grid-template-columns:1fr;
}

.full,
.weather-buttons{
grid-column:span 1;
}

.weather-buttons{
grid-template-columns:1fr;
}

.year-view{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="wrap">

<h1>Smart Todo App</h1>

<div class="add-row">

<input
id="taskInput"
type="text"
placeholder="Task name"
>

<textarea
id="descriptionInput"
placeholder="Task description"
></textarea>

<select id="priority">
<option value="urgent">Urgent</option>
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>

<input
id="dueDate"
type="datetime-local"
>

<select id="recurring">
<option value="none">No Recurring</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Every Other Week</option>
<option value="monthly">Monthly</option>
<option value="lastThursday">Last Thursday of Month</option>
</select>

<div class="weather-buttons">

<button onclick="enableNotifications()">
Enable Notifications
</button>

<button onclick="getWeatherTasks()">
Weather Smart Tasks
</button>

</div>

<button
class="full"
onclick="addTask()"
>
Add Task
</button>

</div>

<div id="taskList"></div>

<div class="calendar-box">

<div class="calendar-header">

<div class="calendar-controls">

<button onclick="changeMonth(-1)">
◀
</button>

<div id="monthTitle"></div>

<button onclick="changeMonth(1)">
▶
</button>

</div>

<select
id="calendarView"
class="view-select"
onchange="renderCalendar()"
>
<option value="month">Month View</option>
<option value="week">Week View</option>
<option value="day">Day View</option>
<option value="year">Year View</option>
</select>

</div>

<div
class="calendar-grid"
id="calendar"
></div>

</div>

</div>

<script>

let currentDate = new Date();

let tasks = [];

const monthNames = [
"January","February","March",
"April","May","June",
"July","August","September",
"October","November","December"
];

const dayNames = [
"Sun","Mon","Tue",
"Wed","Thu","Fri","Sat"
];

function renderCalendar(){

const calendar =
document.getElementById("calendar");

const monthTitle =
document.getElementById("monthTitle");

const view =
document.getElementById("calendarView").value;

calendar.innerHTML = "";
calendar.className = "calendar-grid";

const year =
currentDate.getFullYear();

const month =
currentDate.getMonth();

if(view === "month"){

calendar.classList.add("month-view");

monthTitle.textContent =
`${monthNames[month]} ${year}`;

dayNames.forEach(name=>{

calendar.innerHTML += `
<div class="day-name">
${name}
</div>
`;

});

const firstDay =
new Date(year,month,1).getDay();

const daysInMonth =
new Date(year,month+1,0).getDate();

for(let i=0;i<firstDay;i++){

calendar.innerHTML += `
<div class="empty"></div>
`;

}

for(let day=1;day<=daysInMonth;day++){

const dateString =
`${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

const matchingTasks =
tasks.filter(
t=>t.dueDate.startsWith(dateString)
);

let taskHTML = "";

matchingTasks.forEach(task=>{

taskHTML += `
<div class="calendar-task">
${task.name}
</div>
`;

});

calendar.innerHTML += `

<div
class="day"
onclick="selectDate('${dateString}')"
>

<div class="day-number">
${day}
</div>

${taskHTML}

</div>

`;

}

}

else if(view === "week"){

calendar.classList.add("week-view");

monthTitle.textContent =
"Week View";

for(let i=0;i<7;i++){

const date =
new Date(currentDate);

date.setDate(
currentDate.getDate()
-currentDate.getDay()
+i
);

calendar.innerHTML += `

<div
class="day"
onclick="selectDate('${date.toISOString().split("T")[0]}')"
>

<div class="day-number">
${date.getDate()}
</div>

<strong>
${dayNames[i]}
</strong>

</div>

`;

}

}

else if(view === "day"){

calendar.classList.add("day-view");

monthTitle.textContent =
"Day View";

calendar.innerHTML = `

<div class="day big-day">

<h2>
${currentDate.toDateString()}
</h2>

</div>

`;

}

else if(view === "year"){

calendar.classList.add("year-view");

monthTitle.textContent =
year;

monthNames.forEach((name,index)=>{

calendar.innerHTML += `

<div
class="day year-month"
onclick="openMonth(${index})"
>

${name}

</div>

`;

});

}

}

function openMonth(monthIndex){

currentDate.setMonth(monthIndex);

document.getElementById(
"calendarView"
).value = "month";

renderCalendar();

}

function selectDate(date){

document.getElementById(
"dueDate"
).value = `${date}T12:00`;

window.scrollTo({
top:0,
behavior:"smooth"
});

document.getElementById(
"taskInput"
).focus();

}

function changeMonth(direction){

const view =
document.getElementById("calendarView").value;

if(view === "year"){

currentDate.setFullYear(
currentDate.getFullYear()
+direction
);

}else{

currentDate.setMonth(
currentDate.getMonth()
+direction
);

}

renderCalendar();

}

function addTask(){

const taskInput =
document.getElementById("taskInput");

const descriptionInput =
document.getElementById("descriptionInput");

const priority =
document.getElementById("priority");

const dueDate =
document.getElementById("dueDate");

const recurring =
document.getElementById("recurring");

const taskList =
document.getElementById("taskList");

if(taskInput.value.trim()===""){

alert("Please enter a task.");

return;

}

tasks.push({
name:taskInput.value,
dueDate:dueDate.value
});

const task =
document.createElement("div");

task.className = "task";

task.innerHTML = `

<h3>${taskInput.value}</h3>

<p>
${descriptionInput.value}
</p>

<p>
<strong>Priority:</strong>
${priority.value}
</p>

<p>
<strong>Due:</strong>
${dueDate.value || "None"}
</p>

<p>
<strong>Recurring:</strong>
${recurring.value}
</p>

`;

taskList.appendChild(task);

taskInput.value = "";
descriptionInput.value = "";
dueDate.value = "";

renderCalendar();

}

function enableNotifications(){

alert("Notifications enabled!");

}

function getWeatherTasks(){

alert("Weather smart tasks enabled!");

}

renderCalendar();

</script>

</body>
</html>
