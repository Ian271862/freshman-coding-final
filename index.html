<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Todo List</title>

<style>

/* Makes sizing easier */
*{
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f4f4;
  padding:20px;
}

.wrap{
  max-width:800px;
  margin:auto;
}

.add-row{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

input,select,button{
  padding:10px;
  border-radius:8px;
  border:1px solid #ccc;
}

input[type=text]{
  flex:1;
}

/* Task card */
.task{
  background:white;
  padding:15px;
  border-radius:10px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

/* Makes completed tasks faded */
.done{
  opacity:.5;
  text-decoration:line-through;
}

.badge{
  padding:4px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:bold;
}

.urgent{background:#ffcccc;}
.high{background:#ffe5b4;}
.medium{background:#d9ecff;}
.low{background:#dff5d8;}

.warning{
  color:red;
  font-weight:bold;
}

</style>
</head>

<body>

<div class="wrap">

<h1>Todo List</h1>

<!-- Area where user adds tasks -->
<div class="add-row">

  <!-- Task name input -->
  <input type="text" id="taskInput" placeholder="Task">

  <!-- Priority dropdown -->
  <select id="priority">
    <option value="urgent">Urgent</option>
    <option value="high">High</option>
    <option value="medium">Medium</option>
    <option value="low">Low</option>
  </select>

  <!-- Lets user pick BOTH date and time -->
  <input type="datetime-local" id="dueDate">

  <button onclick="addTask()">Add</button>

</div>

<!-- Tasks get inserted here -->
<div id="taskList"></div>

</div>

<script>

/*
Stores every task.

Each task looks like:
{
  id: unique number,
  text: task name,
  priority: urgent/high/etc,
  dueDate: selected date/time,
  done: true or false
}
*/
let tasks=[];

/* Adds a new task */
function addTask(){

  // Gets text from input
  const text=document.getElementById("taskInput").value.trim();

  // Gets selected priority
  const priority=document.getElementById("priority").value;

  // Gets selected date + time
  const dueDate=document.getElementById("dueDate").value;

  // Stops empty tasks
  if(!text)return;

  // Adds new task object into array
  tasks.push({
    id:Date.now(), // unique id using current time
    text,
    priority,
    dueDate,
    done:false
  });

  // Clears text box after adding
  document.getElementById("taskInput").value="";

  renderTasks();
}

/* Marks task done/undone */
function toggleTask(id){

  // Finds task with matching id
  const task=tasks.find(t=>t.id===id);

  // Switches true/false
  task.done=!task.done;

  renderTasks();
}

/* Deletes task */
function deleteTask(id){

  // Keeps every task EXCEPT deleted one
  tasks=tasks.filter(t=>t.id!==id);

  renderTasks();
}

/* Calculates countdown */
function getCountdown(dateStr){

  // If no due date exists
  if(!dateStr)return null;

  const now=new Date();

  // Converts selected date into real JS date
  const due=new Date(dateStr);

  // Difference in milliseconds
  const diff=due-now;

  // If task is overdue
  if(diff<=0){
    return{
      text:"Overdue",
      warning:true
    };
  }

  // Converts milliseconds into hours/minutes
  const hours=Math.floor(diff/1000/60/60);
  const minutes=Math.floor((diff/1000/60)%60);

  return{
    text:`${hours}h ${minutes}m remaining`,

    // WARNING becomes true if under 3 hours
    warning:hours<3
  };
}

/* Draws all tasks onto page */
function renderTasks(){

  const taskList=document.getElementById("taskList");

  // Clears old HTML before rebuilding
  taskList.innerHTML="";

  tasks.forEach(task=>{

    const countdown=getCountdown(task.dueDate);

    const div=document.createElement("div");

    // Adds "done" class if completed
    div.className=`task ${task.done?"done":""}`;

    div.innerHTML=`

      <div>

        <strong>${task.text}</strong>

        <br><br>

        <span class="badge ${task.priority}">
          ${task.priority.toUpperCase()}
        </span>

        <br><br>

        ${
          task.dueDate
          ?
          `
          Due:
          ${new Date(task.dueDate).toLocaleString()}
          `
          :
          ""
        }

        <br><br>

        ${
          countdown
          ?
          countdown.text
          :
          ""
        }

        <br>

        ${
          countdown && countdown.warning && !task.done
          ?
          "⚠ Due within 3 hours"
          :
          ""
        }

      </div>

      <div>

        <button onclick="toggleTask(${task.id})">
          ${task.done?"Undo":"Done"}
        </button>

        <button onclick="deleteTask(${task.id})">
          Delete
        </button>

      </div>
    `;

    taskList.appendChild(div);

  });
}

/* Re-renders every minute so countdown updates */
setInterval(renderTasks,60000);

</script>

</body>
</html>
