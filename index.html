<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Todo App</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
color:#222;
}

.wrap{
max-width:1200px;
margin:auto;
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 4px 18px rgba(0,0,0,0.08);
}

h1{
text-align:center;
margin-bottom:25px;
font-size:38px;
}

.add-row{
display:grid;
gap:12px;
margin-bottom:30px;
}

input,
textarea,
select,
button{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #ccc;
font-size:15px;
}

button{
background:#4f46e5;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
transition:0.2s;
}

button:hover{
opacity:0.9;
transform:scale(1.01);
}

.weather-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

#taskList{
display:grid;
gap:16px;
margin-top:20px;
}

.task{
background:#f7f8fc;
border-radius:16px;
padding:18px;
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap;
border:1px solid #e3e6f0;
}

.task.done{
opacity:0.7;
background:#ebffef;
}

.task.done h3{
text-decoration:line-through;
}

.task-left{
flex:1;
}

.description{
margin-top:10px;
line-height:1.5;
color:#444;
}

.task-buttons{
display:flex;
gap:10px;
}

.task-buttons button{
width:auto;
padding:10px 16px;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:999px;
font-size:12px;
font-weight:bold;
margin-top:12px;
}

.urgent{
background:#ffd2d2;
}

.high{
background:#ffe5bd;
}

.medium{
background:#dbeaff;
}

.low{
background:#daf7d4;
}

.calendar-box{
margin-top:35px;
background:#fafafa;
border-radius:18px;
padding:20px;
border:1px solid #ddd;
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
gap:12px;
flex-wrap:wrap;
}

.calendar-header button{
width:auto;
padding:10px 18px;
}

#monthTitle{
font-size:28px;
font-weight:bold;
text-align:center;
flex:1;
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px;
}

.day-name{
background:#dde3f8;
padding:12px;
text-align:center;
font-weight:bold;
border-radius:10px;
}

.day{
background:white;
border-radius:14px;
min-height:120px;
padding:10px;
border:1px solid #e1e1e1;
cursor:pointer;
transition:0.2s;
display:flex;
flex-direction:column;
overflow:hidden;
}

.day:hover{
transform:translateY(-2px);
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.day-number{
font-size:13px;
font-weight:bold;
color:#666;
margin-bottom:8px;
}

.calendar-task{
background:#4f46e5;
color:white;
padding:5px 7px;
border-radius:7px;
font-size:11px;
margin-top:5px;
word-break:break-word;
}

.popup{
position:fixed;
top:30px;
right:30px;
background:white;
padding:22px;
border-radius:16px;
box-shadow:0 6px 20px rgba(0,0,0,0.18);
z-index:9999;
max-width:260px;
}

/* =========================
   EDIT MODAL
========================= */

#editModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
z-index:9999;
padding:20px;
}

.edit-box{
background:white;
padding:25px;
border-radius:20px;
width:100%;
max-width:500px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.edit-box h2{
margin-bottom:20px;
text-align:center;
}

.edit-buttons{
display:flex;
gap:12px;
margin-top:10px;
}

.edit-buttons button{
flex:1;
}

@media(max-width:800px){

.calendar-grid{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="wrap">

<h1>Smart Todo App</h1>

<div class="add-row">

<input
id="taskInput"
type="text"
placeholder="Task name">

<textarea
id="descriptionInput"
placeholder="Task description"></textarea>

<select id="priority">
<option value="urgent">Urgent</option>
<option value="high">High</option>
<option value="medium" selected>Medium</option>
<option value="low">Low</option>
</select>

<input
id="dueDate"
type="datetime-local">

<select id="recurring">
<option value="none">No Recurring</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Every Other Week</option>
<option value="monthly">Monthly</option>
</select>

<div class="weather-buttons">

<button onclick="enableNotifications()">
Enable Notifications
</button>

<button onclick="getWeatherTasks()">
Weather Smart Tasks
</button>

</div>

<button onclick="addTask()">
Add Task
</button>

</div>

<div id="taskList"></div>

<div class="calendar-box">

<div class="calendar-header">

<button onclick="changeView(-1)">
◀ Previous
</button>

<div id="monthTitle"></div>

<button onclick="changeView(1)">
Next ▶
</button>

</div>

<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;">

<button onclick="setViewMode('day')">
Day
</button>

<button onclick="setViewMode('week')">
Week
</button>

<button onclick="setViewMode('month')">
Month
</button>

<button onclick="setViewMode('year')">
Year
</button>

</div>

<div id="calendar" class="calendar-grid"></div>

</div>

</div>

<!-- EDIT TASK MODAL -->

<div id="editModal">

<div class="edit-box">

<h2>Edit Task</h2>

<input
id="editTaskInput"
type="text"
placeholder="Task Name">

<textarea
id="editDescriptionInput"
placeholder="Description"
style="height:110px;resize:none;"></textarea>

<select id="editPriority">

<option value="urgent">Urgent</option>
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>

</select>

<input
id="editDueDate"
type="datetime-local">

<div class="edit-buttons">

<button onclick="saveTaskEdit()">
Save
</button>

<button
onclick="closeEditModal()"
style="background:#9ca3af;">
Cancel
</button>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
