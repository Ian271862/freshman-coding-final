<style>
*{box-sizing:border-box;margin:0;padding:0}
.wrap{padding:1rem 0}
.add-row{display:flex;gap:8px;margin-bottom:1rem;align-items:center;flex-wrap:wrap}
.add-row input[type=text]{flex:1;min-width:140px}
.add-row select{width:110px}
.add-row input[type=date]{width:140px}
.filters{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap}
.filters button{font-size:12px;padding:4px 10px;border-radius:20px}
.filters button.active{background:var(--color-background-secondary);font-weight:500}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1.25rem}
.stat{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px;text-align:center}
.stat-n{font-size:22px;font-weight:500;color:var(--color-text-primary)}
.stat-l{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.task-list{display:flex;flex-direction:column;gap:6px}
.task{display:flex;align-items:flex-start;gap:10px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;transition:opacity .2s}
.task.done{opacity:.5}
.task.done .task-text{text-decoration:line-through;color:var(--color-text-secondary)}
.task-main{display:flex;align-items:center;gap:10px;flex:1;min-width:0;flex-wrap:wrap}
.cb{width:18px;height:18px;border-radius:4px;border:1.5px solid var(--color-border-secondary);cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--color-background-primary);margin-top:1px}
.cb.checked{background:var(--color-background-success);border-color:var(--color-border-success)}
.cb svg{display:none}
.cb.checked svg{display:block}
.badge{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;flex-shrink:0}
.p-urgent{background:#FCEBEB;color:#A32D2D}
.p-high{background:#FAEEDA;color:#633806}
.p-medium{background:#E6F1FB;color:#0C447C}
.p-low{background:#EAF3DE;color:#27500A}
.task-text{font-size:14px;color:var(--color-text-primary);flex:1;min-width:80px}
.task-right{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.due-label{font-size:11px;font-weight:500}
.due-label.upcoming{color:var(--color-text-secondary)}
.due-label.soon{color:#633806}
.due-label.today{color:#A32D2D}
.due-label.overdue{color:#A32D2D}
.countdown{font-size:12px;font-family:var(--font-mono);white-space:nowrap}
.countdown.upcoming{color:var(--color-text-tertiary)}
.countdown.soon{color:#854F0B}
.countdown.today{color:#A32D2D;font-weight:500}
.countdown.overdue{color:#A32D2D;font-weight:500}
.del{width:24px;height:24px;border:none;background:none;cursor:pointer;color:var(--color-text-tertiary);font-size:16px;flex-shrink:0;border-radius:4px;display:flex;align-items:center;justify-content:center;margin-top:0}
.del:hover{background:var(--color-background-danger);color:var(--color-text-danger)}
.empty{text-align:center;color:var(--color-text-tertiary);font-size:14px;padding:2rem 0}
.section-label{font-size:11px;font-weight:500;color:var(--color-text-tertiary);text-transform:uppercase;letter-spacing:.06em;margin:1rem 0 6px;padding-left:2px}
</style>
<h2 class="sr-only">Smart to-do list with priority levels, due dates, and live countdown timers</h2>
<div class="wrap">
  <div class="stats">
    <div class="stat"><div class="stat-n" id="s-total">0</div><div class="stat-l">Total</div></div>
    <div class="stat"><div class="stat-n" id="s-urgent" style="color:#A32D2D">0</div><div class="stat-l">Urgent</div></div>
    <div class="stat"><div class="stat-n" id="s-open">0</div><div class="stat-l">Open</div></div>
    <div class="stat"><div class="stat-n" id="s-done" style="color:var(--color-text-success)">0</div><div class="stat-l">Done</div></div>
  </div>

  <div class="add-row">
    <input id="taskInput" type="text" placeholder="Add a task..." />
    <select id="priSel">
      <option value="urgent">Urgent</option>
      <option value="high">High</option>
      <option value="medium" selected>Medium</option>
      <option value="low">Low</option>
    </select>
    <input id="dueInput" type="datetime-local" style="width:175px" />
    <button onclick="addTask()">Add</button>
  </div>

  <div class="filters">
    <span style="font-size:13px;color:var(--color-text-secondary);align-self:center;margin-right:2px">Show:</span>
    <button class="active" data-f="all" onclick="setFilter('all',this)">All</button>
    <button data-f="open" onclick="setFilter('open',this)">Open</button>
    <button data-f="done" onclick="setFilter('done',this)">Done</button>
    <button data-f="urgent" onclick="setFilter('urgent',this)">Urgent</button>
    <button data-f="high" onclick="setFilter('high',this)">High</button>
    <button data-f="medium" onclick="setFilter('medium',this)">Medium</button>
    <button data-f="low" onclick="setFilter('low',this)">Low</button>
  </div>

  <div id="list"></div>
</div>
