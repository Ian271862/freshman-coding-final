<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Smart Todo App</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif
}

body{
background:#f3f4f8;
padding:20px;
color:#222
}

.wrap{
max-width:1000px;
margin:auto
}

h1{
text-align:center;
margin-bottom:20px
}

.add-row,
.calendar-box,
.task{
background:#fff;
border-radius:16px;
box-shadow:0 4px 12px rgba(0,0,0,.08)
}

.add-row{
padding:20px;
display:grid;
gap:12px;
margin-bottom:25px
}

input,
textarea,
select,
button{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ccc;
font-size:15px
}

textarea{
resize:vertical;
min-height:80px
}

button{
cursor:pointer;
border:none;
background:#4f46e5;
color:#fff;
font-weight:bold;
transition:.2s
}

button:hover{
opacity:.9
}

#taskList{
display:grid;
gap:15px;
margin-bottom:35px
}

.task{
padding:18px;
display:flex;
justify-content:space-between;
gap:20px;
flex-wrap:wrap
}

.task-left{
flex:1;
min-width:240px
}

.task h3{
margin-bottom:8px;
word-break:break-word
}

.description{
margin-bottom:10px;
color:#555;
white-space:pre-wrap;
word-break:break-word
}

.task-buttons{
display:flex;
gap:10px;
flex-wrap:wrap
}

.done{
opacity:.55;
text-decoration:line-through
}

.badge{
display:inline-block;
padding:6px 12px;
border-radius:999px;
font-size:12px;
font-weight:bold;
margin-top:8px
}

.urgent{background:#ffd2d2}
.high{background:#ffe5bd}
.medium{background:#dbeaff}
.low{background:#daf7d4}

.warning{
color:red;
font-weight:bold;
margin-top:8px
}

.calendar-box{
padding:20px
}

.calendar-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px
}

.calendar-header button{
width:auto;
padding:10px 16px
}

#monthTitle{
font-size:22px;
font-weight:bold
}

.calendar-grid{
display:grid;
grid-template-columns:repeat(7,1fr);
gap:8px
}

.day-name{
text-align:center;
font-weight:bold;
padding:10px 0
}

.day{
background:#f5f5f5;
border-radius:12px;
min-height:90px;
padding:8px;
cursor:pointer;
transition:.2s;
overflow:hidden
}

.day:hover{
background:#e6e6ff
}

.day-number{
font-weight:bold;
margin-bottom:5px
}

.calendar-task{
background:#4f46e5;
color:#fff;
border-radius:6px;
padding:2px 6px;
margin-top:4px;
font-size:11px;
overflow:hidden;
text-overflow:ellipsis;
white-space:nowrap
}

.popup{
position:fixed;
top:20px;
right:20px;
background:#fff;
padding:20px;
border-radius:16px;
box-shadow:0 8px 24px rgba(0,0,0,.2);
max-width:300px;
z-index:999;
animation:slide .3s ease
}

.weather-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px
}

@keyframes slide{
from{
transform:translateX(80px);
opacity:0
}
to{
transform:translateX(0);
opacity:1
}
}

@media(max-width:700px){

.task{
flex-direction:column
}

.day{
min-height:70px;
font-size:12px
}

.calendar-grid{
gap:5px
}

.weather-buttons{
grid-template-columns:1fr
}

}

</style>
</head>

<body>

<div class="wrap">

<h1>Smart Todo App</h1>

<div class="add-row">

<input id="taskInput" type="text" placeholder="Task name">

<textarea id="descriptionInput" placeholder="Task description"></textarea>

<select id="priority">
<option value="urgent">Urgent</option>
<option value="high">High</option>
<option value="medium">Medium</option>
<option value="low">Low</option>
</select>

<input id="dueDate" type="datetime-local" step="60">

<select id="recurring">
<option value="none">No Recurring</option>
<option value="daily">Daily</option>
<option value="weekly">Weekly</option>
<option value="biweekly">Every Other Week</option>
<option value="monthly">Monthly</option>
<option value="lastThursday">Last Thursday of the Month</option>
</select>

<div class="weather-buttons">

<button onclick="enableNotifications()">
Enable Notifications
</button>

<button onclick="getWeatherTasks()">
Enable Weather Smart Tasks
</button>

</div>

<button onclick="addTask()">
Add Task
</button>

</div>

<div id="taskList"></div>

<div class="calendar-box">

<div class="calendar-header">

<button onclick="changeMonth(-1)">
◀
</button>

<div id="monthTitle"></div>

<button onclick="changeMonth(1)">
▶
</button>

</div>

<div class="calendar-grid" id="calendar"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
